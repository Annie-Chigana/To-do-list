<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task</title>
    
  <link rel="icon" type="image/png" href="1-6491cb1b.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="add-container">
        <div class="add-section">
            <a href="index.html"><i class="fa-solid fa-x"></i></a>

            <div class="task-details">
                <div class="tsk-name">
                <label for="task-name">Task Name</label>
                <input type="text" id="task-name" name="task-name" placeholder="e.g. Go for a run!">
                </div>
                <div class="dt">
                <label for="date">Date</label>
                <input type="date" id="date" name="date">
                </div>

                 <div class="btn-actions">
                <button class="btn-clear" id="clear-btn">Clear</button>
                <button class="btn-save" id="save-btn">Save</button>
            </div>
            </div>
           
        </div>
    </div>
</body>


<script src="script.js"></script>
</html>
